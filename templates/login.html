<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Analytics — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            border: 1px solid #2a2a40;
            max-width: 420px;
            width: 90%;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fe2c55, #25f4ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #888; margin-bottom: 32px; }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            color: #888;
            font-size: 0.85em;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #2a2a40;
            border-radius: 8px;
            color: #e8e8e8;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #fe2c55;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px 36px;
            background: #fe2c55;
            color: white;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn:hover { background: #e0254a; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .error {
            background: rgba(244,67,54,0.15);
            color: #f44336;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 0.9em;
            display: none;
        }
        .loading {
            display: none;
            padding: 20px;
            text-align: center;
            color: #888;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #555;
            border-top-color: #fe2c55;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info {
            margin-top: 24px;
            color: #666;
            font-size: 0.8em;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>TikTok Analytics</h1>
        <p>Log in with your TikTok account to track growth and analyze performance.</p>

        <div class="error" id="error-box"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="login-input">Email, phone, or username</label>
                <input type="text" id="login-input" placeholder="Enter your login" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password-input">Password</label>
                <input type="password" id="password-input" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn" id="login-btn">Log In</button>
        </form>

        <div class="loading" id="loading-box">
            <span class="spinner"></span>
            Logging in via browser...<br>
            <small>This may take 15-30 seconds</small>
        </div>

        <div class="info">
            If CAPTCHA appears, use the CLI:<br>
            <code style="background:#0f0f1a;padding:2px 6px;border-radius:4px;">python -m cli.main auth login --no-headless</code>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const loginInput = document.getElementById('login-input');
            const passwordInput = document.getElementById('password-input');
            const form = document.getElementById('login-form');
            const loading = document.getElementById('loading-box');
            const errorBox = document.getElementById('error-box');
            const btn = document.getElementById('login-btn');

            // Hide error, show loading
            errorBox.style.display = 'none';
            form.style.display = 'none';
            loading.style.display = 'block';

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        login: loginInput.value,
                        password: passwordInput.value,
                    }),
                });

                const data = await resp.json();

                if (resp.ok && data.ok) {
                    window.location.href = '/';
                } else {
                    loading.style.display = 'none';
                    form.style.display = 'block';
                    errorBox.textContent = data.error || 'Login failed. Please try again.';
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                loading.style.display = 'none';
                form.style.display = 'block';
                errorBox.textContent = 'Connection error. Please try again.';
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
